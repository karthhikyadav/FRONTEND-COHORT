<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Login Clone</title>
    <link rel="stylesheet" href="day15.css">
</head>

<body>
    <div class="container">
        <div class="logo">
            <div class="cloud">salesforce</div>
        </div>
        <form class="login-box">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="">
            <button type="submit" class="login-btn">Log In</button>
            <div class="remember-row">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>
            <div class="links-row">
                <a href="#">Forgot Your Password?</a>
                <a href="#">Use Custom Domain</a>
            </div>
            <div class="divider"><span>or</span></div>
            <button type="button" class="email-btn">
                <span class="email-icon">&#9993;</span>
                Log In with Email
            </button>
        </form>
        <div class="footer">
            <span>Not a customer?</span>
            <button class="try-btn">Try for Free</button>
        </div>
        <div class="copyright">
            © 2025 Salesforce, Inc. All rights reserved. | <a href="#">Privacy</a>
        </div>
    </div>
    <script src="day15.js"></script>
</body>

</html>
